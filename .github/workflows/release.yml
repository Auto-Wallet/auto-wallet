name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension
        env:
          TENDERLY_ACCESS_TOKEN: ${{ secrets.TENDERLY_ACCESS_TOKEN }}
          TENDERLY_API_URL: ${{ secrets.TENDERLY_API_URL }}
        run: bun run build

      - name: Package zip
        run: |
          cd dist
          zip -r ../auto-wallet-${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Auto Wallet ${{ github.ref_name }}
          body: |
            ## Auto Wallet ${{ github.ref_name }}

            ### Installation
            1. Download `auto-wallet-${{ github.ref_name }}.zip`
            2. Open `chrome://extensions`
            3. Enable **Developer mode**
            4. Click **Load unpacked** and select the extracted folder
          files: auto-wallet-${{ github.ref_name }}.zip
          generate_release_notes: true
